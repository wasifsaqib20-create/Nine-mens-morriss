<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine Mens Morris - Bet & Play</title>
    <style>
        body { background: #1a1a1a; color: gold; font-family: sans-serif; text-align: center; }
        .board { width: 300px; height: 300px; border: 2px solid gold; margin: 20px auto; position: relative; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { background: gold; color: black; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .wallet { border: 1px solid #333; padding: 10px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>🏆 Nine Mens Morris 🏆</h1>
    <div class="wallet">
        <p>Balance: RS. <span id="balance">500</span></p>
        <button>Deposit (JazzCash/EasyPaisa)</button>
    </div>

    <div class="board" id="game-board">
        <p style="margin-top: 130px;">Board Design Loading...</p>
    </div>

    <div class="controls">
        <input type="number" id="bet-amount" placeholder="Enter Bet (min 100)" style="padding: 10px;">
        <button onclick="startGame()">START GAME (VS AI)</button>
        <button style="background: #28a745; color: white;">Customer Support (WhatsApp)</button>
    </div>

    <script>
        function startGame() {
            let bet = document.getElementById('bet-amount').value;
            if(bet < 100) { alert("Minimum bet 100 RS hai!"); return; }
            alert("Game Started! AI (Expert Mode) se aapka match lag gaya hai.");
        }
    </script>
</body>
</html>
