<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nine Men Morris | Pro Arena</title>
    <style>
        :root { --gold: #E8B86B; --dark: #1C1814; --red: #D32F2F; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0806; font-family: sans-serif; color: #fff; padding: 15px; text-align: center; }
        
        .header h1 { font-size: 24px; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; }
        .stats { display: flex; justify-content: space-around; background: var(--dark); padding: 15px; border-radius: 15px; border: 1px solid rgba(232,184,107,0.2); margin-bottom: 15px; }
        .stat-box p { font-size: 10px; color: #888; }
        .stat-box span { font-size: 18px; font-weight: bold; color: var(--gold); }

        .board-container { position: relative; background: #1E1A12; padding: 10px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin: 0 auto 15px; max-width: 400px; }
        canvas { width: 100%; height: auto; display: block; touch-action: none; cursor: pointer; }

        .status-msg { background: rgba(232,184,107,0.1); padding: 10px; border-radius: 10px; color: var(--gold); font-weight: bold; margin-bottom: 15px; min-height: 40px; }
        
        .controls { background: var(--dark); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); }
        .btn { width: 100%; padding: 12px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-start { background: linear-gradient(135deg, #E8B86B, #B8860B); color: #000; }
        .btn-reset { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h1>NINE MEN MORRIS</h1>
        <p style="font-size: 10px; color: #666; margin-bottom: 15px;">ADVANCED AI SYSTEM</p>
    </div>

    <div class="stats">
        <div class="stat-box"><p>YOU</p><span id="pPieces">9</span></div>
        <div class="stat-box"><p>PHASE</p><span id="phaseDisp">START</span></div>
        <div class="stat-box"><p>AI</p><span id="aPieces">9</span></div>
    </div>

    <div class="board-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div id="status" class="status-msg">Click START to Play</div>

    <div class="controls">
        <div style="margin-bottom: 10px;">
            <span style="font-size: 12px; color: #888;">BET AMOUNT: </span>
            <span id="betDisp" style="color: var(--gold); font-weight: bold;">$100</span>
        </div>
        <button id="startBtn" class="btn btn-start" onclick="initGame()">🎮 START GAME</button>
        <button class="btn btn-reset" onclick="resetGame()">🔄 RESET</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisp = document.getElementById('status');
        
        // Game Constants
        const P_COLOR = "#E8B86B";
        const A_COLOR = "#D32F2F";
        const points = [];
        const size = 400;
        const margin = 40;
        const step = (size - 2 * margin) / 6;

        // Board Logic
        let board = new Array(24).fill(null);
        let turn = 'P'; // P for Player, A for AI
        let phase = 'PLACE'; // PLACE, MOVE, FLY
        let pToPlace = 9, aToPlace = 9;
        let pTotal = 9, aTotal = 9;
        let selected = null, mustRemove = false;
        let gameRunning = false;

        // Generate coordinates for 24 points
        const createPoints = () => {
            for(let i=0; i<3; i++) { // 3 squares
                let d = i * step;
                let s = size - 2*(margin + d);
                let x = margin + d, y = margin + d;
                // Points in each square (Clockwise)
                points.push({x:x, y:y}, {x:x+s/2, y:y}, {x:x+s, y:y},
                            {x:x+s, y:y+s/2}, {x:x+s, y:y+s}, {x:x+s/2, y:y+s},
                            {x:x, y:y+s}, {x:x, y:y+s/2});
            }
        };
        createPoints();

        // Connections for movement
        const adj = [
            [1,7], [0,2,9], [1,3], [2,4,11], [3,5], [4,6,13], [5,7], [0,6,15],
            [9,15], [1,8,10,17], [9,11], [3,10,12,19], [11,13], [5,12,14,21], [13,15], [7,14,16,23],
            [17,23], [9,16,18], [17,19], [11,18,20], [19,21], [13,20,22], [21,23], [15,22]
        ];

        // Mill logic
        const mills = [
            [0,1,2],[2,3,4],[4,5,6],[6,7,0], // Outer
            [8,9,10],[10,11,12],[12,13,14],[14,15,8], // Mid
            [16,17,18],[18,19,20],[20,21,22],[22,23,16], // Inner
            [1,9,17],[3,11,19],[5,13,21],[7,15,23] // Crosses
        ];

        function draw() {
            ctx.clearRect(0,0,size,size);
            ctx.strokeStyle = "#5A4A2E";
            ctx.lineWidth = 3;

            // Draw Squares
            for(let i=0; i<3; i++) {
                let d = i * step;
                ctx.strokeRect(margin+d, margin+d, size-2*(margin+d), size-2*(margin+d));
            }
            // Draw Cross lines
            ctx.beginPath();
            ctx.moveTo(size/2, margin); ctx.lineTo(size/2, margin+2*step);
            ctx.moveTo(size/2, size-margin); ctx.lineTo(size/2, size-margin-2*step);
            ctx.moveTo(margin, size/2); ctx.lineTo(margin+2*step, size/2);
            ctx.moveTo(size-margin, size/2); ctx.lineTo(size-margin-2*step, size/2);
            ctx.stroke();

            // Draw Points
            points.forEach((p, i) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, 7);
                ctx.fillStyle = "#333";
                ctx.fill();
                
                if(board[i]) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 16, 0, 7);
                    ctx.fillStyle = board[i] === 'P' ? P_COLOR : A_COLOR;
                    ctx.fill();
                    ctx.strokeStyle = "#fff";
                    ctx.lineWidth = 2;
                    if(selected === i) ctx.stroke();
                }
            });
        }

        canvas.onclick = (e) => {
            if(!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (size/rect.width);
            const y = (e.clientY - rect.top) * (size/rect.height);

            let clickedIdx = -1;
            points.forEach((p, i) => {
                if(Math.hypot(p.x-x, p.y-y) < 20) clickedIdx = i;
            });

            if(clickedIdx !== -1) handleAction(clickedIdx);
        };

        function handleAction(idx) {
            if(mustRemove) {
                if(board[idx] === 'A') {
                    if(isPartofMill(idx, 'A') && !allInMill('A')) {
                        statusDisp.innerText = "Cannot remove piece in a Mill!";
                        return;
                    }
                    board[idx] = null;
                    aTotal--;
                    mustRemove = false;
                    checkGameOver() ? null : switchTurn();
                }
                return;
            }

            if(phase === 'PLACE') {
                if(board[idx] === null) {
                    board[idx] = 'P';
                    pToPlace--;
                    if(checkMill(idx, 'P')) { mustRemove = true; statusDisp.innerText = "MILL! Remove AI Piece"; }
                    else switchTurn();
                }
            } else {
                if(selected === null) {
                    if(board[idx] === 'P') selected = idx;
                } else {
                    if(isValidMove(selected, idx, 'P')) {
                        board[idx] = 'P'; board[selected] = null;
                        selected = null;
                        if(checkMill(idx, 'P')) { mustRemove = true; statusDisp.innerText = "MILL! Remove AI Piece"; }
                        else switchTurn();
                    } else { selected = null; }
                }
            }
            updateStats();
            draw();
        }

        function isValidMove(from, to, owner) {
            if(board[to] !== null) return false;
            let currentTotal = owner === 'P' ? pTotal : aTotal;
            if(currentTotal === 3) return true; // Flying
            return adj[from].includes(to);
        }

        function checkMill(idx, owner) {
            return mills.some(m => m.includes(idx) && m.every(i => board[i] === owner));
        }

        function isPartofMill(idx, owner) { return checkMill(idx, owner); }
        
        function allInMill(owner) {
            return board.every((v, i) => v === owner ? isPartofMill(i, owner) : true);
        }

        function switchTurn() {
            turn = 'A';
            statusDisp.innerText = "AI is thinking...";
            setTimeout(aiMove, 600);
        }

        function aiMove() {
            if(!gameRunning) return;
            let moveMade = false;

            if(pToPlace === 0 && aToPlace === 0) phase = 'MOVE';

            if(aToPlace > 0) {
                let empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
                let best = empty[Math.floor(Math.random()*empty.length)];
                board[best] = 'A'; aToPlace--;
                if(checkMill(best, 'A')) aiRemove();
                moveMade = true;
            } else {
                // Simple AI Move
                let myPieces = board.map((v,i) => v === 'A' ? i : null).filter(v => v !== null);
                for(let p of myPieces) {
                    let targets = board.map((v,i) => isValidMove(p, i, 'A') ? i : null).filter(v => v !== null);
                    if(targets.length > 0) {
                        let t = targets[0];
                        board[t] = 'A'; board[p] = null;
                        if(checkMill(t, 'A')) aiRemove();
                        moveMade = true;
                        break;
                    }
                }
            }
            
            turn = 'P';
            statusDisp.innerText = "Your Turn";
            if(pToPlace === 0 && aToPlace === 0) phase = 'MOVE';
            updateStats();
            draw();
            checkGameOver();
        }

        function aiRemove() {
            let targets = board.map((v,i) => v === 'P' ? i : null).filter(v => v !== null);
            let removable = targets.filter(t => !isPartofMill(t, 'P'));
            let target = removable.length > 0 ? removable[0] : targets[0];
            board[target] = null;
            pTotal--;
        }

        function updateStats() {
            document.getElementById('pPieces').innerText = pToPlace > 0 ? pToPlace : pTotal;
            document.getElementById('aPieces').innerText = aToPlace > 0 ? aToPlace : aTotal;
            document.getElementById('phaseDisp').innerText = phase;
        }

        function checkGameOver() {
            if(pTotal < 3 && pToPlace === 0) { alert("AI wins!"); resetGame(); return true; }
            if(aTotal < 3 && aToPlace === 0) { alert("You win!"); resetGame(); return true; }
            return false;
        }

        function initGame() {
            gameRunning = true;
            document.getElementById('startBtn').innerText = "🎮 IN GAME";
            statusDisp.innerText = "Your Turn - Place Pieces";
            draw();
        }

        function resetGame() {
            board.fill(null);
            pToPlace = 9; aToPlace = 9; pTotal = 9; aTotal = 9;
            phase = 'PLACE'; turn = 'P'; gameRunning = false;
            document.getElementById('startBtn').innerText = "🎮 START GAME";
            statusDisp.innerText = "Click START to Play";
            updateStats();
            draw();
        }

        draw(); // Initial draw
    </script>
</body>
</html>
