<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nine Men's Morris</title>

<style>
body {
  background:#1e1e1e;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1 { color: gold; }

canvas {
  background:#c89b63;
  border-radius:20px;
  margin-top:20px;
}

button {
  margin-top:20px;
  padding:10px 30px;
  border:none;
  background:gold;
  border-radius:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>NINE MEN MORRIS</h1>
<h3 id="status">Press Start</h3>

<canvas id="board" width="400" height="400"></canvas>
<br>
<button onclick="startGame()">START GAME</button>

<script>

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let currentPlayer = "player";
let phase = "placing";

let playerPieces = 9;
let aiPieces = 9;

let selected = null;

const points = [
  [50,50],[200,50],[350,50],
  [100,100],[200,100],[300,100],
  [150,150],[200,150],[250,150],

  [50,200],[100,200],[150,200],
  [250,200],[300,200],[350,200],

  [150,250],[200,250],[250,250],
  [100,300],[200,300],[300,300],
  [50,350],[200,350],[350,350]
];

let board = Array(24).fill(null);

const connections = {
  0:[1,9], 1:[0,2,4], 2:[1,14],
  3:[4,10],4:[1,3,5,7],5:[4,13],
  6:[7,11],7:[4,6,8],8:[7,12],
  9:[0,10,21],10:[3,9,11,18],11:[6,10,15],
  12:[8,13,17],13:[5,12,14,20],14:[2,13,23],
  15:[11,16],16:[15,17,19],17:[12,16],
  18:[10,19],19:[16,18,20,22],20:[13,19],
  21:[9,22],22:[19,21,23],23:[14,22]
};

const mills = [
  [0,1,2],[3,4,5],[6,7,8],
  [15,16,17],[18,19,20],[21,22,23],
  [0,9,21],[3,10,18],[6,11,15],
  [1,4,7],[16,19,22],[8,12,17],
  [5,13,20],[2,14,23]
];

function drawBoard(){
  ctx.clearRect(0,0,400,400);

  ctx.strokeStyle="#5c3b1e";
  ctx.lineWidth=3;

  // squares
  drawSquare(50,50,300);
  drawSquare(100,100,200);
  drawSquare(150,150,100);

  // lines
  drawLine(200,50,200,150);
  drawLine(200,250,200,350);
  drawLine(50,200,150,200);
  drawLine(250,200,350,200);

  // points
  points.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p[0],p[1],8,0,Math.PI*2);
    ctx.fillStyle = board[i]==="player"?"white":
                    board[i]==="ai"?"black":"#333";
    ctx.fill();
  });
}

function drawSquare(x,y,size){
  ctx.strokeRect(x,y,size,size);
}
function drawLine(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

canvas.addEventListener("click",(e)=>{
  if(currentPlayer!=="player") return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let clicked = getPoint(x,y);
  if(clicked===null) return;

  if(phase==="placing"){
    if(board[clicked]===null){
      board[clicked]="player";
      playerPieces--;
      checkMill(clicked,"player");
      switchTurn();
    }
  } else {
    if(selected===null && board[clicked]==="player"){
      selected = clicked;
    } else if(selected!==null && board[clicked]===null){
      if(connections[selected].includes(clicked)){
        board[clicked]="player";
        board[selected]=null;
        selected=null;
        checkMill(clicked,"player");
        switchTurn();
      }
    }
  }

  updatePhase();
  drawBoard();
});

function getPoint(x,y){
  for(let i=0;i<points.length;i++){
    let dx = x - points[i][0];
    let dy = y - points[i][1];
    if(Math.sqrt(dx*dx+dy*dy)<10) return i;
  }
  return null;
}

function checkMill(pos,player){
  for(let m of mills){
    if(m.includes(pos)){
      if(board[m[0]]===player &&
         board[m[1]]===player &&
         board[m[2]]===player){

        removeOpponentPiece(player);
      }
    }
  }
}

function removeOpponentPiece(player){
  let opponent = player==="player"?"ai":"player";
  for(let i=0;i<board.length;i++){
    if(board[i]===opponent){
      board[i]=null;
      break;
    }
  }
}

function switchTurn(){
  currentPlayer = currentPlayer==="player"?"ai":"player";
  document.getElementById("status").innerText = "Turn: "+currentPlayer;

  if(currentPlayer==="ai"){
    setTimeout(aiMove,700);
  }
}

function aiMove(){
  let empty = board.map((v,i)=>v===null?i:null).filter(v=>v!==null);

  if(phase==="placing"){
    let move = empty[Math.floor(Math.random()*empty.length)];
    board[move]="ai";
    aiPieces--;
    checkMill(move,"ai");
  } else {
    let aiPoints = board.map((v,i)=>v==="ai"?i:null).filter(v=>v!==null);
    let from = aiPoints[Math.floor(Math.random()*aiPoints.length)];
    let moves = connections[from].filter(i=>board[i]===null);
    if(moves.length){
      let to = moves[Math.floor(Math.random()*moves.length)];
      board[to]="ai";
      board[from]=null;
      checkMill(to,"ai");
    }
  }

  updatePhase();
  switchTurn();
  drawBoard();
}

function updatePhase(){
  if(playerPieces===0 && aiPieces===0){
    phase="moving";
  }
}

function startGame(){
  board.fill(null);
  playerPieces=9;
  aiPieces=9;
  phase="placing";
  currentPlayer="player";
  drawBoard();
}

drawBoard();

</script>

</body>
</html>
