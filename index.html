<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nine Men Morris</title>

<style>
body {
  text-align: center;
  font-family: Arial;
}

h1 {
  font-size: 22px;
}

canvas {
  width: 95vw;
  height: 95vw;
  max-width: 500px;
  border: 2px solid black;
}
</style>
</head>

<body>

<h1>NINE MEN MORRIS</h1>
<canvas id="board"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let size = Math.min(window.innerWidth * 0.95, 500);
canvas.width = size;
canvas.height = size;

let points = [];
let playerTurn = "P"; // Player = P, AI = A

// 🔵 Create board points
function createPoints() {
  let s = size;

  points = [
    [s*0.1,s*0.1],[s*0.5,s*0.1],[s*0.9,s*0.1],
    [s*0.2,s*0.2],[s*0.5,s*0.2],[s*0.8,s*0.2],
    [s*0.3,s*0.3],[s*0.5,s*0.3],[s*0.7,s*0.3],
    [s*0.1,s*0.5],[s*0.2,s*0.5],[s*0.3,s*0.5],
    [s*0.7,s*0.5],[s*0.8,s*0.5],[s*0.9,s*0.5],
    [s*0.3,s*0.7],[s*0.5,s*0.7],[s*0.7,s*0.7],
    [s*0.2,s*0.8],[s*0.5,s*0.8],[s*0.8,s*0.8],
    [s*0.1,s*0.9],[s*0.5,s*0.9],[s*0.9,s*0.9]
  ];
}

let board = Array(24).fill(null);

// 🎨 Draw board
function drawBoard() {
  ctx.clearRect(0,0,size,size);

  ctx.strokeRect(size*0.1,size*0.1,size*0.8,size*0.8);
  ctx.strokeRect(size*0.2,size*0.2,size*0.6,size*0.6);
  ctx.strokeRect(size*0.3,size*0.3,size*0.4,size*0.4);

  ctx.beginPath();
  ctx.moveTo(size*0.5,size*0.1);
  ctx.lineTo(size*0.5,size*0.3);

  ctx.moveTo(size*0.5,size*0.7);
  ctx.lineTo(size*0.5,size*0.9);

  ctx.moveTo(size*0.1,size*0.5);
  ctx.lineTo(size*0.3,size*0.5);

  ctx.moveTo(size*0.7,size*0.5);
  ctx.lineTo(size*0.9,size*0.5);

  ctx.stroke();

  // Draw points
  for(let i=0;i<points.length;i++){
    ctx.beginPath();
    ctx.arc(points[i][0],points[i][1],8,0,Math.PI*2);
    ctx.fillStyle = board[i] === "P" ? "blue" :
                    board[i] === "A" ? "red" : "black";
    ctx.fill();
  }
}

// 🧠 Simple AI (random move = 50% smart / 50% dumb feel)
function aiMove() {
  let empty = [];

  for(let i=0;i<board.length;i++){
    if(board[i] === null){
      empty.push(i);
    }
  }

  if(empty.length === 0) return;

  let move = empty[Math.floor(Math.random() * empty.length)];
  board[move] = "A";

  playerTurn = "P";
  drawBoard();
}

// 👆 Click event
canvas.addEventListener("click", function(e) {
  if(playerTurn !== "P") return;

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  for(let i=0;i<points.length;i++){
    let dx = x - points[i][0];
    let dy = y - points[i][1];

    if(Math.sqrt(dx*dx + dy*dy) < 15){
      if(board[i] === null){
        board[i] = "P";
        playerTurn = "A";
        drawBoard();

        setTimeout(aiMove, 500);
      }
    }
  }
});

// 🚀 Start
createPoints();
drawBoard();

</script>

</body>
</html>
