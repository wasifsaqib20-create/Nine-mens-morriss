<!DOCTYPE html>
<html>
<head>
  <title>Nine Mens Game</title>
  <style>
    body {
      background:#0b132b;
      color:white;
      text-align:center;
      font-family:sans-serif;
    }

    #board {
      display:grid;
      grid-template-columns: repeat(7,50px);
      gap:10px;
      justify-content:center;
      margin-top:20px;
    }

    .cell {
      width:50px;
      height:50px;
      background:#1c2541;
      border-radius:10px;
      cursor:pointer;
    }

    .player { background:lime; }
    .ai { background:red; }

    button {
      padding:8px 15px;
      margin:10px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    #restart { background:red; color:white; }
  </style>
</head>

<body>

<h2>Nine Mens Game</h2>
<p id="turn">Turn: Player</p>
<p>Balance: <span id="balance">1000</span></p>

<button id="restart">Restart</button>

<div id="board"></div>

<script src="index.js"></script>
</body>
</html>
