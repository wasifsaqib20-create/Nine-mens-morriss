<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine Men Morris - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="game-container">
        <header>
            <h1>NINE MEN MORRIS</h1>
            <p class="subtitle">ADVANCED AI SYSTEM</p>
        </header>

        <div class="score-board">
            <div class="stat-box">
                <span class="label">YOU</span>
                <span id="player-pieces" class="value">9</span>
            </div>
            <div class="phase-display">
                <span class="label">PHASE</span>
                <span id="game-phase" class="phase-text">PLACE</span>
            </div>
            <div class="stat-box">
                <span class="label">AI</span>
                <span id="ai-pieces" class="value">9</span>
            </div>
        </div>

        <div id="board-container" class="glass-panel">
            <div id="game-board">
                </div>
        </div>

        <div class="controls-panel">
            <div class="bet-input-section">
                <p>SET YOUR BET AMOUNT</p>
                <div class="input-wrapper">
                    <span class="currency">$</span>
                    <input type="number" id="bet-amount" value="100" min="10" step="10">
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="start-btn" onclick="handleStart()" class="btn-primary">🎮 START GAME</button>
                <button id="reset-btn" onclick="handleReset()" class="btn-secondary">🔄 RESET</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" class="overlay">
        <div class="win-card">
            <h2 id="result-title">VICTORY!</h2>
            <p id="result-message">You won the bet!</p>
            <div class="prize-display">$<span id="final-prize">0</span></div>
            <button onclick="closeWinOverlay()" class="btn-primary">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
