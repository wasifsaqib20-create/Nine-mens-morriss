<body>
<style>
#board {
  position: relative;
  width: 400px;
  height: 400px;
}

#lines {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
<h1>NINE MEN MORRIS</h1>

<div id="board">
  <canvas id="lines"></canvas>
</div>
<script>
const board = document.getElementById("board");

const points = [
  [10,10],[50,10],[90,10],
  [20,20],[50,20],[80,20],
  [30,30],[50,30],[70,30],
  [10,50],[20,50],[30,50],[70,50],[80,50],[90,50],
  [30,70],[50,70],[70,70],
  [20,80],[50,80],[80,80],
  [10,90],[50,90],[90,90]
];

points.forEach(p => {
let dot = document.createElement("div");
dot.style.position = "absolute";
dot.style.width = "14px";
dot.style.height = "14px";
dot.style.border = "2px solid white";
dot.style.background = "#5a3b1e";
dot.style.borderRadius = "50%";
dot.style.left = p[0] + "%";
dot.style.top = p[1] + "%";
dot.style.transform = "translate(-50%, -50%)";
  board.appendChild(dot);
});
  const canvas = document.getElementById("lines");
const ctx = canvas.getContext("2d");

canvas.width = board.offsetWidth;
canvas.height = board.offsetHeight;

ctx.strokeStyle = "black";
ctx.lineWidth = 2;

function drawLine(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

// outer square
drawLine(40,40,360,40);
drawLine(360,40,360,360);
drawLine(360,360,40,360);
drawLine(40,360,40,40);

// middle square
drawLine(80,80,320,80);
drawLine(320,80,320,320);
drawLine(320,320,80,320);
drawLine(80,320,80,80);

// inner square
drawLine(120,120,280,120);
drawLine(280,120,280,280);
drawLine(280,280,120,280);
drawLine(120,280,120,120);

// connections
drawLine(200,40,200,120);
drawLine(200,280,200,360);
drawLine(40,200,120,200);
drawLine(280,200,360,200);
</script>
</body>
