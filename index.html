<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Nine Men's Morris</title>

<style>
body {
  background:#1e1e1e;
  color:white;
  text-align:center;
  font-family:Arial;
  touch-action: manipulation; /* zoom fix */
}

h1 { color: gold; }

canvas {
  background:#c89b63;
  border-radius:20px;
  margin-top:20px;
  width:90vw;
  max-width:400px;
}

button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  background:gold;
  border-radius:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>NINE MEN MORRIS</h1>
<h3 id="status">Press Start</h3>

<canvas id="board" width="400" height="400"></canvas>
<br>
<button onclick="startGame()">START GAME</button>

<script>

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let currentPlayer = "player";
let phase = "placing";

let playerPieces = 9;
let aiPieces = 9;

let selected = null;

const points = [
  [50,50],[200,50],[350,50],
  [100,100],[200,100],[300,100],
  [150,150],[200,150],[250,150],
  [50,200],[100,200],[150,200],
  [250,200],[300,200],[350,200],
  [150,250],[200,250],[250,250],
  [100,300],[200,300],[300,300],
  [50,350],[200,350],[350,350]
];

let board = Array(24).fill(null);

// DRAW
function drawBoard(){
  ctx.clearRect(0,0,400,400);

  ctx.strokeStyle="#5c3b1e";
  ctx.lineWidth=3;

  drawSquare(50,50,300);
  drawSquare(100,100,200);
  drawSquare(150,150,100);

  drawLine(200,50,200,150);
  drawLine(200,250,200,350);
  drawLine(50,200,150,200);
  drawLine(250,200,350,200);

  points.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p[0],p[1],12,0,Math.PI*2); // bigger points
    ctx.fillStyle = "#222";
    ctx.fill();

    if(board[i]){
      drawPiece(p[0],p[1], board[i]);
    }
  });
}

function drawPiece(x,y,type,scale=1){
  ctx.beginPath();
  ctx.arc(x,y,15*scale,0,Math.PI*2);
  ctx.fillStyle = type==="player"?"white":"black";
  ctx.fill();
}

function drawSquare(x,y,s){ ctx.strokeRect(x,y,s,s); }
function drawLine(x1,y1,x2,y2){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
}

// CLICK FIX (NO ZOOM + ACCURATE)
canvas.addEventListener("click",(e)=>{
  e.preventDefault();

  if(currentPlayer!=="player") return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  let clicked = getPoint(x,y);
  if(clicked===null) return;

  if(phase==="placing"){
    if(board[clicked]===null){
      animatePlace(clicked,"player");
    }
  }

  drawBoard();
});

function getPoint(x,y){
  for(let i=0;i<points.length;i++){
    let dx = x - points[i][0];
    let dy = y - points[i][1];
    if(Math.sqrt(dx*dx+dy*dy)<20) return i; // easier click
  }
  return null;
}

// 🐢 SMOOTH ANIMATION
function animatePlace(index, player){
  let scale = 0;

  function grow(){
    drawBoard();
    drawPiece(points[index][0], points[index][1], player, scale);
    scale += 0.1;

    if(scale < 1){
      requestAnimationFrame(grow);
    } else {
      board[index] = player;
      playerPieces--;
      switchTurn();
    }
  }

  grow();
}

// TURN
function switchTurn(){
  currentPlayer = currentPlayer==="player"?"ai":"player";
  document.getElementById("status").innerText = "Turn: "+currentPlayer;

  if(currentPlayer==="ai"){
    setTimeout(aiMove,800);
  }
}

// 🤖 AI
function aiMove(){
  let empty = board.map((v,i)=>v===null?i:null).filter(v=>v!==null);

  let move = empty[Math.floor(Math.random()*empty.length)];
  board[move]="ai";
  aiPieces--;

  switchTurn();
  drawBoard();
}

// START
function startGame(){
  board.fill(null);
  playerPieces=9;
  aiPieces=9;
  currentPlayer="player";
  drawBoard();
}

drawBoard();

</script>

</body>
</html>
