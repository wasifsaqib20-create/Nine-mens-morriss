<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Nine Men's Morris - Crypto Edition</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        canvas { background: #2c3e50; border: 5px solid #ecf0f1; border-radius: 10px; cursor: pointer; }
        .controls { margin: 20px; }
        button { padding: 10px 20px; font-size: 16px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .stats { font-size: 18px; margin-bottom: 10px; color: #f1c40f; }
    </style>
</head>
<body>

    <h1>NINE MEN'S MORRIS (PRO)</h1>
    <div class="stats">
        Phase: <span id="phaseText">Placement</span> | 
        Turn: <span id="turnText">Player 1 (White)</span>
    </div>
    
    <canvas id="gameBoard" width="600" height="600"></canvas>

    <div class="controls">
        <button onclick="resetGame()">Reset Game</button>
        <button onclick="connectWallet()" style="background:#8e44ad">Connect Crypto Wallet</button>
    </div>

<script>
const canvas = document.getElementById('gameBoard');
const ctx = canvas.getContext('2d');
const phaseText = document.getElementById('phaseText');
const turnText = document.getElementById('turnText');

// Game State
let currentPlayer = 1; // 1 = White, 2 = Black
let phase = 'placement'; // placement, movement, flying
let piecesPlaced = { 1: 0, 2: 0 };
let piecesOnBoard = { 1: 0, 2: 0 };
const maxPieces = 9;

// Board Coordinates (24 positions)
const points = [
    {x:50, y:50}, {x:300, y:50}, {x:550, y:50},
    {x:125, y:125}, {x:300, y:125}, {x:475, y:125},
    {x:200, y:200}, {x:300, y:200}, {x:400, y:200},
    {x:50, y:300}, {x:125, y:300}, {x:200, y:300}, {x:400, y:300}, {x:475, y:300}, {x:550, y:300},
    {x:200, y:400}, {x:300, y:400}, {x:400, y:400},
    {x:125, y:475}, {x:300, y:475}, {x:475, y:475},
    {x:50, y:550}, {x:300, y:550}, {x:550, y:550}
];

let boardState = Array(24).fill(0); // 0: empty, 1: P1, 2: P2

function drawBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;

    // Draw Squares
    ctx.strokeRect(50, 50, 500, 500);
    ctx.strokeRect(125, 125, 350, 350);
    ctx.strokeRect(200, 200, 200, 200);

    // Draw Connecting Lines
    ctx.beginPath();
    ctx.moveTo(300, 50); ctx.lineTo(300, 200);
    ctx.moveTo(300, 400); ctx.lineTo(300, 550);
    ctx.moveTo(50, 300); ctx.lineTo(200, 300);
    ctx.moveTo(400, 300); ctx.lineTo(550, 300);
    ctx.stroke();

    // Draw Points and Pieces
    points.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = "#bdc3c7";
        ctx.fill();

        if (boardState[i] !== 0) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
            ctx.fillStyle = boardState[i] === 1 ? "white" : "black";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "cyan";
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    });
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    points.forEach((p, i) => {
        const dist = Math.sqrt((x - p.x)**2 + (y - p.y)**2);
        if (dist < 25) handleMove(i);
    });
});

function handleMove(index) {
    if (phase === 'placement') {
        if (boardState[index] === 0) {
            boardState[index] = currentPlayer;
            piecesPlaced[currentPlayer]++;
            piecesOnBoard[currentPlayer]++;
            
            checkPhaseTransition();
            switchTurn();
        }
    }
    // Add Movement & Flying Logic here...
    drawBoard();
}

function switchTurn() {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    turnText.innerText = `Player ${currentPlayer} (${currentPlayer === 1 ? 'White' : 'Black'})`;
}

function checkPhaseTransition() {
    if (piecesPlaced[1] === maxPieces && piecesPlaced[2] === maxPieces) {
        phase = 'movement';
        phaseText.innerText = "Movement Phase";
    }
    // Logic for Flying: If piecesOnBoard[currentPlayer] === 3
}

async function connectWallet() {
    if (window.ethereum) {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        alert("Wallet Connected: " + accounts[0]);
    } else {
        alert("Please install MetaMask!");
    }
}

drawBoard();
</script>
</body>
</html>
