<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine Mens Morris - Pro Betting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0a0a0a; color: #fff; }
        .gold-gradient { background: linear-gradient(145deg, #ffd700, #b8860b); color: #000; }
        .board-container { position: relative; width: 340px; height: 340px; margin: 0 auto; background: #1a1a1a; border: 4px solid #d4af37; border-radius: 10px; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        .line { position: absolute; background: #444; }
        .dot { width: 18px; height: 18px; background: #333; border: 2px solid #555; border-radius: 50%; position: absolute; z-index: 10; transform: translate(-50%, -50%); cursor: pointer; transition: 0.3s; }
        .dot:hover { background: #ffd700; transform: translate(-50%, -50%) scale(1.2); }
        .dot.player { background: #ffd700; border-color: #fff; box-shadow: 0 0 10px #ffd700; }
        .dot.ai { background: #ff4d4d; border-color: #fff; box-shadow: 0 0 10px #ff4d4d; }
        .status-bar { border-left: 4px solid #ffd700; background: rgba(255,215,0,0.1); }
        .animate-pulse-gold { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); } 70% { box-shadow: 0 0 0 10px rgba(212,175,55,0); } 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); } }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto mb-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-wider">PREMIUM SLOTS</h1>
            <button class="bg-green-600 text-white px-4 py-1 rounded-full text-sm font-bold shadow-lg">Support</button>
        </div>
        
        <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 shadow-2xl">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-zinc-400 text-xs uppercase font-semibold">Total Balance</p>
                    <p class="text-2xl font-bold text-yellow-500">RS. <span id="balance">500.00</span></p>
                </div>
                <div class="text-right">
                    <p class="text-zinc-400 text-xs uppercase font-semibold">Bonus</p>
                    <p class="text-lg font-bold text-green-400">RS. 100</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="showModal('deposit')" class="gold-gradient py-2 rounded-xl font-bold text-sm">DEPOSIT</button>
                <button onclick="showModal('withdraw')" class="bg-zinc-800 py-2 rounded-xl font-bold text-sm border border-zinc-700">WITHDRAW</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto text-center">
        <div id="game-info" class="status-bar p-3 mb-4 rounded-r-lg text-sm font-medium italic">
            Select bet and press START to match...
        </div>

        <div class="board-container" id="board">
            <div class="line" style="top: 0; left: 0; width: 100%; height: 2px;"></div>
            <div class="line" style="top: 50%; left: 0; width: 100%; height: 2px;"></div>
            <div class="line" style="bottom: 0; left: 0; width: 100%; height: 2px;"></div>
            <div class="line" style="left: 0; top: 0; width: 2px; height: 100%;"></div>
            <div class="line" style="left: 50%; top: 0; width: 2px; height: 100%;"></div>
            <div class="line" style="right: 0; top: 0; width: 2px; height: 100%;"></div>

            <div id="dots-layer"></div>
        </div>

        <div class="mt-8 space-y-4">
            <div class="flex items-center justify-center gap-4">
                <span class="text-zinc-400 font-bold">BET:</span>
                <select id="bet-select" class="bg-zinc-900 border border-zinc-700 p-2 rounded-lg text-yellow-500 font-bold">
                    <option value="100">RS. 100</option>
                    <option value="500">RS. 500</option>
                    <option value="1000">RS. 1000</option>
                </select>
            </div>
            
            <button onclick="startMatchmaking()" id="start-btn" class="gold-gradient w-full py-4 rounded-2xl font-black text-xl shadow-xl animate-pulse-gold">
                START MATCH
            </button>
        </div>
    </div>

    <a href="https://wa.me/yournumber" class="fixed bottom-6 right-6 bg-green-500 p-3 rounded-full shadow-2xl">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-8 h-8" alt="Support">
    </a>

    <script>
        let wallet = 500;
        const dotsLayer = document.getElementById('dots-layer');
        const positions = [
            {t:5, l:5}, {t:5, l:50}, {t:5, l:95},
            {t:20, l:20}, {t:20, l:50}, {t:20, l:80},
            {t:35, l:35}, {t:35, l:50}, {t:35, l:65},
            {t:50, l:5}, {t:50, l:20}, {t:50, l:35}, {t:50, l:65}, {t:50, l:80}, {t:50, l:95},
            {t:65, l:35}, {t:65, l:50}, {t:65, l:65},
            {t:80, l:20}, {t:80, l:50}, {t:80, l:80},
            {t:95, l:5}, {t:95, l:50}, {t:95, l:95}
        ];

        // Create Dots
        positions.forEach((pos, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.top = pos.t + '%';
            dot.style.left = pos.l + '%';
            dot.onclick = () => handleMove(i, dot);
            dotsLayer.appendChild(dot);
        });

        function startMatchmaking() {
            const bet = document.getElementById('bet-select').value;
            if(wallet < bet) return alert("Low Balance!");
            
            const btn = document.getElementById('start-btn');
            btn.innerText = "FINDING OPPONENT...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "PLAYING VS AI";
                document.getElementById('game-info').innerText = "Match Found! You vs AI (Expert). Bet: RS. " + bet;
                wallet -= bet;
                document.getElementById('balance').innerText = wallet.toFixed(2);
            }, 2000);
        }

        function handleMove(index, element) {
            if(!element.classList.contains('player') && !element.classList.contains('ai')) {
                element.classList.add('player');
                // Simple AI Counter Move
                setTimeout(() => {
                    let dots = document.querySelectorAll('.dot:not(.player):not(.ai)');
                    if(dots.length > 0) dots[Math.floor(Math.random()*dots.length)].classList.add('ai');
                }, 600);
            }
        }

        function showModal(type) {
            alert(type.toUpperCase() + " system: JazzCash/EasyPaisa integration requires API keys. Manual mode active.");
        }
    </script>
</body>
</html>
