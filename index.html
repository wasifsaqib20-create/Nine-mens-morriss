<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nine Men Morris</title>

<style>
body{
    margin:0;
    background:#2f2f2f;
    font-family:sans-serif;
    text-align:center;
    color:white;
}

h1{
    color:#ffd700;
    margin-top:20px;
}

canvas{
    margin-top:20px;
    background:linear-gradient(145deg,#d9a86c,#c7935c);
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ffd700;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>NINE MEN MORRIS</h1>
<p id="turn">Turn: Player</p>

<canvas id="board" width="360" height="360"></canvas>

<button onclick="startGame()">START GAME</button>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let board = new Array(24).fill(null);
let turn = "player";
let gameStarted = false;

// ✅ PERFECT REALISTIC POSITIONS (CENTER TIGHT)
const pos = [
[20,20],[180,20],[340,20],
[70,70],[180,70],[290,70],
[120,120],[180,120],[240,120],
[20,180],[70,180],[120,180],[240,180],[290,180],[340,180],
[120,240],[180,240],[240,240],
[70,290],[180,290],[290,290],
[20,340],[180,340],[340,340]
];

// DRAW BOARD
function drawBoard(){
    ctx.clearRect(0,0,360,360);

    ctx.strokeStyle="#5a3b1c";
    ctx.lineWidth=4;

    // squares (adjusted)
    ctx.strokeRect(20,20,320,320);
    ctx.strokeRect(70,70,220,220);
    ctx.strokeRect(120,120,120,120);

    // middle lines
    drawLine(180,20,180,120);
    drawLine(180,240,180,340);
    drawLine(20,180,120,180);
    drawLine(240,180,340,180);

    // points
    for(let i=0;i<24;i++){
        let [x,y]=pos[i];

        ctx.beginPath();
        ctx.arc(x,y,8,0,Math.PI*2);
        ctx.fillStyle="#5a3b1c";
        ctx.fill();

        ctx.shadowBlur=10;
        ctx.shadowColor="white";
        ctx.fill();
        ctx.shadowBlur=0;

        if(board[i]=="player"){
            ctx.beginPath();
            ctx.arc(x,y,10,0,Math.PI*2);
            ctx.fillStyle="white";
            ctx.fill();
        }
        if(board[i]=="ai"){
            ctx.beginPath();
            ctx.arc(x,y,10,0,Math.PI*2);
            ctx.fillStyle="black";
            ctx.fill();
        }
    }
}

function drawLine(x1,y1,x2,y2){
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
}

// CLICK
canvas.addEventListener("click",(e)=>{
    if(!gameStarted) return;

    const rect=canvas.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;

    for(let i=0;i<24;i++){
        let dx=x-pos[i][0];
        let dy=y-pos[i][1];

        if(Math.sqrt(dx*dx+dy*dy)<15){
            if(board[i]==null){
                board[i]=turn;
                switchTurn();
                drawBoard();
                break;
            }
        }
    }
});

function switchTurn(){
    turn = (turn=="player") ? "ai" : "player";
    document.getElementById("turn").innerText="Turn: "+turn;

    if(turn=="ai"){
        setTimeout(aiMove,500);
    }
}

// AI
function aiMove(){
    let empty=[];
    for(let i=0;i<24;i++){
        if(board[i]==null) empty.push(i);
    }
    if(empty.length){
        let move=empty[Math.floor(Math.random()*empty.length)];
        board[move]="ai";
        switchTurn();
        drawBoard();
    }
}

function startGame(){
    board.fill(null);
    turn="player";
    gameStarted=true;
    drawBoard();
}

drawBoard();
</script>

</body>
</html>
