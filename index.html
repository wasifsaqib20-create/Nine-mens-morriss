<!DOCTYPE html>
<html>
<head>
  <title>Nine Men Morris</title>
  <style>
    body {
      background: #1c1c1c;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-family: Arial;
    }

    h1 {
      color: gold;
    }

    canvas {
      background: #c89b63;
      border-radius: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>NINE MEN MORRIS</h1>

<canvas id="board" width="300" height="300"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

// draw squares
function drawBoard() {
  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;

  // outer
  ctx.strokeRect(20, 20, 260, 260);
  // middle
  ctx.strokeRect(60, 60, 180, 180);
  // inner
  ctx.strokeRect(100, 100, 100, 100);

  // lines
  ctx.beginPath();
  ctx.moveTo(150, 20); ctx.lineTo(150, 100);
  ctx.moveTo(150, 200); ctx.lineTo(150, 280);
  ctx.moveTo(20, 150); ctx.lineTo(100, 150);
  ctx.moveTo(200, 150); ctx.lineTo(280, 150);
  ctx.stroke();

  // points (24)
  const points = [
    [20,20],[150,20],[280,20],
    [60,60],[150,60],[240,60],
    [100,100],[150,100],[200,100],
    [20,150],[60,150],[100,150],
    [200,150],[240,150],[280,150],
    [100,200],[150,200],[200,200],
    [60,240],[150,240],[240,240],
    [20,280],[150,280],[280,280]
  ];

  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 5, 0, Math.PI*2);
    ctx.fill();
  });
}

drawBoard();
</script>

</body>
</html>
