<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nine Men Morris - Pro Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="login-card">
            <h2>Welcome Pro Player</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="emailLogin()" class="btn-main">Login / Sign Up</button>
            <div class="separator">OR</div>
            <button onclick="googleLogin()" class="btn-google">Login with Google</button>
        </div>
    </div>

    <div class="game-container">
        <header>
            <h1>NINE MEN MORRIS</h1>
            <p>ADVANCED AI SYSTEM</p>
        </header>

        <div class="score-board">
            <div class="stat"><span>YOU</span><br><b id="player-pieces">9</b></div>
            <div class="phase-box"><span>PHASE</span><br><b id="game-phase">PLACE</b></div>
            <div class="stat"><span>AI</span><br><b id="ai-pieces">9</b></div>
        </div>

        <div id="board" class="board-layout">
            </div>

        <div class="betting-section">
            <p>SET YOUR BET</p>
            <div class="bet-input-wrapper">
                <span>$</span>
                <input type="number" id="bet-amount" value="100" min="10">
            </div>
            <button id="start-btn" onclick="startGame()" class="btn-gold">🎮 START GAME</button>
            <button id="reset-btn" onclick="resetGame()" class="btn-outline">🔄 RESET</button>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2 id="winner-text">YOU WIN!</h2>
            <p id="win-prize">You earned $200</p>
            <button onclick="closeModal()" class="btn-gold">PLAY AGAIN</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
